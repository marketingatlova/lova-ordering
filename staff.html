<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LOVA — Staff Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e; --navy2: #2d3447;
      --red: #c0392b; --red-soft: #fdf0ef; --red-border: #f5c6c2;
      --canvas: #f7f5f0; --surface: #ffffff;
      --border: #e4e1db; --border-soft: #ede9e3;
      --text: #1a1f2e; --text-2: #5a5750; --text-3: #9a9690;
      --green: #1e7d52; --green-soft: #edf7f2; --green-border: #b8e0ce;
      --blue: #1a5fa8; --blue-soft: #eef3fb; --blue-border: #bcd3f0;
      --amber: #925c0d; --amber-soft: #fdf5e6; --amber-border: #f5dba8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--canvas); min-height: 100vh; padding-bottom: 48px; }

    /* ── NAV ── */
    .top-nav { background: var(--navy); padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-left { display: flex; align-items: baseline; gap: 10px; }
    .nav-wordmark { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .nav-tag { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; }
    .nav-user { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.55); }
    .btn-logout { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.12); padding: 6px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s; }
    .btn-logout:active { background: rgba(255,255,255,0.14); }

    .content { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* ── CARDS ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(26,31,46,0.04); }

    .section-label { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-soft); }

    /* ── BRANCH SELECTOR ── */
    .branch-label { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 6px; }
    .branch-select { width: 100%; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; }
    .branch-row { display: flex; align-items: center; justify-content: space-between; }

    .btn-history { background: transparent; color: var(--text-3); border: 1px solid var(--border); border-radius: 7px; padding: 8px 14px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.3px; cursor: pointer; width: 100%; margin-top: 12px; transition: background 0.15s, color 0.15s; }
    .btn-history:active { background: var(--canvas); color: var(--text-2); }

    /* ── TABS ── */
    .tabs { display: flex; background: var(--canvas); border: 1px solid var(--border); border-radius: 9px; padding: 3px; margin-bottom: 14px; gap: 3px; }
    .tab { flex: 1; text-align: center; padding: 10px 8px; font-size: 12px; font-weight: 500; color: var(--text-3); cursor: pointer; border-radius: 7px; transition: background 0.15s, color 0.15s; letter-spacing: 0.3px; }
    .tab.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 1px 3px rgba(26,31,46,0.07); }

    /* ── SEARCH & CHIPS ── */
    .search-input { width: 100%; height: 44px; border: 1px solid var(--border); border-radius: 9px; padding: 0 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400; color: var(--text); background: var(--surface); outline: none; margin-bottom: 10px; -webkit-appearance: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--navy2); }

    .chips { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 6px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { padding: 6px 13px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--text-3); font-size: 11px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; }
    .chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── PRODUCT CARDS ── */
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; transition: border-color 0.15s; }
    .product-card.has-qty { border-color: var(--navy); }
    .prod-img { width: 44px; height: 44px; border-radius: 7px; object-fit: cover; background: var(--canvas); flex-shrink: 0; }
    .prod-info { flex: 1; padding: 0 12px; }
    .prod-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .prod-desc { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .qty-input { width: 60px; height: 44px; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 500; border: 1px solid var(--border); border-radius: 8px; background: var(--canvas); color: var(--text); outline: none; -webkit-appearance: none; padding: 0; transition: border-color 0.15s, background 0.15s; }
    .qty-input:focus { border-color: var(--navy); background: var(--surface); }

    /* ── PRIMARY BUTTON ── */
    .btn-primary { width: 100%; height: 50px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: opacity 0.15s, transform 0.15s; background: var(--navy); color: #fff; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary:hover:not(:disabled) { background: var(--navy2); }
    .btn-green { background: var(--green); }
    .btn-green:hover:not(:disabled) { background: #176641; }
    .btn-blue { background: var(--blue); }
    .btn-blue:hover:not(:disabled) { background: #134d8c; }
    .btn-red { background: var(--red); }
    .btn-red:hover:not(:disabled) { background: #a33024; }

    /* ── ACTIVE ORDERS ── */
    .order-batch { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
    .batch-head { padding: 13px 15px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .batch-head-left { display: flex; align-items: flex-start; gap: 10px; flex: 1; cursor: pointer; }
    .batch-id-text { font-size: 12px; font-weight: 600; color: var(--text); }
    .batch-meta { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; margin-top: 5px; }
    .badge-pending { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-border); }
    .badge-prepping { background: var(--canvas); color: var(--text-3); border: 1px solid var(--border); }
    .badge-way { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-border); }
    .badge-verified { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-border); }

    .btn-sm { padding: 7px 13px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.3px; cursor: pointer; border: 1px solid; transition: background 0.15s; white-space: nowrap; flex-shrink: 0; }
    .btn-sm-blue { background: var(--blue-soft); color: var(--blue); border-color: var(--blue-border); }
    .btn-sm-blue:active { background: #dde9f7; }
    .btn-sm-amber { background: var(--amber-soft); color: var(--amber); border-color: var(--amber-border); }
    .btn-sm-amber:active { background: #f7e8c8; }
    .btn-sm-muted { background: var(--canvas); color: var(--text-3); border-color: var(--border); cursor: not-allowed; }

    .order-details { display: none; border-top: 1px dashed var(--border); padding: 10px 14px; }
    .order-item-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border-soft); }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .order-item-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .order-qty-display { font-size: 18px; font-weight: 500; color: var(--text); }

    .select-all-bar { background: var(--canvas); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; margin-bottom: 12px; }
    .select-all-bar label { font-size: 12px; font-weight: 500; color: var(--text-2); cursor: pointer; display: flex; align-items: center; gap: 10px; }
    input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--blue); cursor: pointer; }

    /* ── HISTORY ── */
    .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
    .hist-id { font-size: 12px; font-weight: 600; color: var(--text); }
    .hist-time { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .hist-status { font-size: 11px; font-weight: 600; color: var(--green); }
    .hist-item { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-2); font-weight: 500; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
    .hist-item:last-child { border-bottom: none; }
    .hist-item strong { color: var(--text); font-weight: 600; }
    .hist-driver { font-size: 11px; color: var(--text-2); margin-top: 10px; background: var(--canvas); padding: 5px 9px; border-radius: 5px; display: inline-block; border: 1px solid var(--border); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(26,31,46,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-sheet { background: var(--surface); width: 100%; max-width: 600px; border-radius: 18px 18px 0 0; padding: 22px 20px 40px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); max-height: 85vh; display: flex; flex-direction: column; }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 32px; height: 3px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--text); }
    .modal-sub { font-size: 11px; font-weight: 500; color: var(--text-3); margin-top: 4px; margin-bottom: 18px; letter-spacing: 0.3px; text-transform: uppercase; }
    .modal-list { overflow-y: auto; flex: 1; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
    .modal-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed var(--border); }
    .modal-item:last-child { border-bottom: none; }
    .modal-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .modal-item-qty { font-size: 14px; font-weight: 600; color: var(--green); background: var(--green-soft); padding: 4px 12px; border-radius: 6px; border: 1px solid var(--green-border); }
    .modal-total { font-size: 13px; font-weight: 600; color: var(--text); text-align: right; margin: 12px 0 18px; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-cancel { flex: 1; height: 48px; background: var(--canvas); color: var(--text-2); border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: background 0.15s; }
    .btn-cancel:active { background: var(--border); }
    .btn-confirm { flex: 2; height: 48px; background: var(--green); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
    .btn-confirm:active { transform: scale(0.98); }
    .btn-confirm:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .loading { text-align: center; color: var(--text-3); padding: 40px 20px; font-size: 13px; }
    .empty-state { text-align: center; color: var(--green); padding: 40px 20px; font-size: 13px; font-weight: 500; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <div class="nav-wordmark">LOVA</div>
      <div class="nav-tag">Staff</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="nav-user" id="navUser"></div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="content">
    <div class="card">
      <span class="branch-label">Ordering for branch</span>
      <div class="branch-row">
        <select id="branchSelector" class="branch-select" onchange="handleBranchChange()">
          <option value="" disabled selected>Select a branch…</option>
        </select>
      </div>
      <button class="btn-history" id="btnToggleHistory" onclick="toggleHistory()">View 7-day history</button>
    </div>

    <div id="mainArea">
      <div class="tabs">
        <div class="tab active" id="tabOrder" onclick="switchTab('order')">Place order</div>
        <div class="tab" id="tabReceive" onclick="switchTab('receive')">Active orders</div>
      </div>
      <div id="viewOrder"><div class="loading">Loading menu…</div></div>
      <div id="viewReceive" style="display:none;"><div class="loading">Loading active orders…</div></div>
    </div>

    <div id="viewHistory" style="display:none;">
      <div class="section-label">Completed deliveries — last 7 days</div>
      <div id="historyContent"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <div class="modal-overlay" id="reviewModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Review order</div>
      <div class="modal-sub" id="modalBranch">Target: —</div>
      <div class="modal-list" id="modalList"></div>
      <div class="modal-total" id="modalTotal">Total units: 0</div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Go back</button>
        <button class="btn-confirm" id="btnConfirm" onclick="confirmOrder()">Confirm & send</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzeZ8CLU50nn2MDA6EoU0ZKnu8qihZRU-LhAgsk9GVqa7TKA44J5fVx-lMu-oeFiGWqfA/exec";
    const pin = sessionStorage.getItem("lova_pin") || "";
    if (!pin) window.location.href = "index.html";

    let masterProducts = [], masterBranches = [], currentUser = null;
    let selectedBranch = "", pendingDeliveries = [];
    let pendingOrderData = [], isShowingHistory = false, filterCat = "ALL";

    async function callGAS(action, params = {}) {
      const res = await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action, ...params }) });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.result;
    }

    async function init() {
      try {
        currentUser = await callGAS("verifyStaff", { pin });
        document.getElementById("navUser").textContent = currentUser.name;
        const initData = await callGAS("getStaffAppInitData");
        masterProducts = initData.products;
        masterBranches = initData.branches;
        const sel = document.getElementById("branchSelector");
        masterBranches.forEach(b => sel.innerHTML += `<option value="${b}">${b}</option>`);
        renderOrderMenu();
        if (currentUser.branch) { sel.value = currentUser.branch; selectedBranch = currentUser.branch; fetchDeliveries(); }
      } catch (err) { alert("Session error: " + err.message); window.location.href = "index.html"; }
    }

    function logout() { sessionStorage.clear(); window.location.href = "logout.html?src=staff"; }

    function handleBranchChange() {
      const newBranch = document.getElementById("branchSelector").value;
      if (currentUser.role !== "Admin" && currentUser.branch && newBranch !== currentUser.branch) {
        if (!confirm("Branch override\n\nYou are assigned to: " + currentUser.branch + "\nOrdering for: " + newBranch + "\n\nContinue?")) {
          document.getElementById("branchSelector").value = selectedBranch; return;
        }
      }
      selectedBranch = newBranch; fetchDeliveries();
    }

    async function fetchDeliveries() {
      if (!selectedBranch) return;
      document.getElementById("viewReceive").innerHTML = '<div class="loading">Checking active orders…</div>';
      document.getElementById("historyContent").innerHTML = '<div class="loading">Loading history…</div>';
      try {
        const [pending, history] = await Promise.all([
          callGAS("getPendingReceivingForBranch", { branch: selectedBranch }),
          callGAS("getOrderHistory", { branch: selectedBranch })
        ]);
        pendingDeliveries = pending; renderReceiveView(pending); renderHistory(history);
      } catch (err) { document.getElementById("viewReceive").innerHTML = '<div class="loading">Error loading orders.</div>'; }
    }

    function switchTab(tab) {
      document.getElementById("tabOrder").classList.toggle("active", tab === "order");
      document.getElementById("tabReceive").classList.toggle("active", tab === "receive");
      document.getElementById("viewOrder").style.display = tab === "order" ? "block" : "none";
      document.getElementById("viewReceive").style.display = tab === "receive" ? "block" : "none";
    }

    function toggleHistory() {
      isShowingHistory = !isShowingHistory;
      document.getElementById("mainArea").style.display = isShowingHistory ? "none" : "block";
      document.getElementById("viewHistory").style.display = isShowingHistory ? "block" : "none";
      document.getElementById("btnToggleHistory").textContent = isShowingHistory ? "← Back to ordering" : "View 7-day history";
    }

    function renderOrderMenu() {
      let cats = ["ALL"];
      masterProducts.forEach(p => { const c = (p[3] || "Uncategorized").trim(); if (!cats.includes(c)) cats.push(c); });
      let html = `<input type="text" id="searchInput" class="search-input" placeholder="Search products…" oninput="filterProducts()">`;
      html += `<div class="chips">`;
      cats.forEach(c => { const safe = c.replace(/[^a-zA-Z0-9]/g,""); html += `<div class="chip ${c==="ALL"?"active":""}" id="chip-${safe}" onclick="setCategory('${c}')">${c}</div>`; });
      html += `</div><div id="productList">`;
      masterProducts.forEach((p, i) => {
        const cat = (p[3] || "Uncategorized").trim();
        const imgHtml = p[4] ? `<img src="${p[4]}" class="prod-img">` : `<div class="prod-img"></div>`;
        const descHtml = p[2] ? `<div class="prod-desc">${p[2]}</div>` : "";
        html += `<div class="product-card item-card" data-name="${(p[1]||"").toLowerCase()}" data-cat="${cat}">${imgHtml}<div class="prod-info"><div class="prod-name">${p[1]}</div>${descHtml}</div><input type="number" id="qty-${i}" class="qty-input" placeholder="0" inputmode="numeric" min="0" oninput="this.closest('.product-card').classList.toggle('has-qty',parseInt(this.value)>0)"></div>`;
      });
      html += `</div><button class="btn-primary" onclick="reviewOrder()">Review order</button>`;
      document.getElementById("viewOrder").innerHTML = html;
    }

    function setCategory(cat) {
      filterCat = cat;
      document.querySelectorAll(".chip").forEach(el => el.classList.remove("active"));
      document.getElementById("chip-" + cat.replace(/[^a-zA-Z0-9]/g,""))?.classList.add("active");
      filterProducts();
    }

    function filterProducts() {
      const q = (document.getElementById("searchInput")?.value || "").toLowerCase();
      document.querySelectorAll(".item-card").forEach(card => {
        card.style.display = (card.dataset.name.includes(q) && (filterCat === "ALL" || card.dataset.cat === filterCat)) ? "flex" : "none";
      });
    }

    function reviewOrder() {
      pendingOrderData = []; let total = 0, html = "";
      masterProducts.forEach((p, i) => {
        const qty = parseInt(document.getElementById("qty-"+i)?.value);
        if (qty > 0) { pendingOrderData.push({ name: p[1], qty }); total += qty; html += `<div class="modal-item"><span class="modal-item-name">${p[1]}</span><span class="modal-item-qty">×${qty}</span></div>`; }
      });
      if (!pendingOrderData.length) { alert("Please enter at least one quantity."); return; }
      document.getElementById("modalBranch").textContent = "Target: " + selectedBranch;
      document.getElementById("modalList").innerHTML = html;
      document.getElementById("modalTotal").textContent = "Total units: " + total;
      document.getElementById("reviewModal").classList.add("open");
    }

    function closeModal() { document.getElementById("reviewModal").classList.remove("open"); }

    async function confirmOrder() {
      const btn = document.getElementById("btnConfirm");
      btn.textContent = "Sending…"; btn.disabled = true;
      try {
        const msg = await callGAS("processOrder", { orderData: pendingOrderData, userInfo: { name: currentUser.name, pin }, targetBranch: selectedBranch });
        closeModal(); alert(msg);
        masterProducts.forEach((_, i) => { const el = document.getElementById("qty-"+i); if(el) el.value = ""; });
        document.querySelectorAll(".product-card").forEach(c => c.classList.remove("has-qty"));
        await fetchDeliveries(); switchTab("receive");
      } catch (err) { alert("Error: " + err.message); }
      btn.textContent = "Confirm & send"; btn.disabled = false;
    }

    function renderReceiveView(data) {
      const container = document.getElementById("viewReceive");
      if (!data.length) { container.innerHTML = '<div class="empty-state">All clear — no active orders for this branch.</div>'; return; }
      const grouped = {};
      data.forEach((item, idx) => { item._idx = idx; if (!grouped[item.id]) grouped[item.id] = { id: item.id, date: item.date, orderedBy: item.orderedBy, items: [] }; grouped[item.id].items.push(item); });
      let hasReceivable = false, html = "";
      for (const key in grouped) {
        const grp = grouped[key], safeId = key.replace(/[^a-zA-Z0-9]/g,"");
        const status = grp.items[0].status, isPending = status === "" || status === "PENDING", isPrepping = status === "SENT";
        if (!isPending && !isPrepping) hasReceivable = true;
        const statusBadge = isPending ? `<div class="badge badge-pending">Awaiting cut-off</div>` : isPrepping ? `<div class="badge badge-prepping">Prepping</div>` : `<div class="badge badge-verified">On the way / verified</div>`;
        const actionBtn = isPending ? `<button class="btn-sm btn-sm-amber" id="editBtn-${safeId}" onclick="toggleEdit('${safeId}')">Edit</button>` : isPrepping ? `<button class="btn-sm btn-sm-muted" disabled>Awaiting driver</button>` : `<button class="btn-sm btn-sm-blue" id="confirmBtn-${safeId}" onclick="submitReceipt('${safeId}')">Confirm</button>`;
        const chkHtml = (!isPending && !isPrepping) ? `<input type="checkbox" id="chk-${safeId}" class="indv-chk" checked>` : "";
        html += `<div class="order-batch"><div class="batch-head">${chkHtml}<div class="batch-head-left" onclick="toggleDetails('${safeId}')"><div><div class="batch-id-text">${grp.id}</div><div class="batch-meta">By ${grp.orderedBy} · ${grp.date}</div>${statusBadge}</div></div>${actionBtn}</div><div class="order-details" id="det-${safeId}">`;
        grp.items.forEach(item => {
          html += `<div class="order-item-row"><div><div class="order-item-name">${item.item}</div>${!isPending ? `<div class="order-item-sub">Expected: ${item.qty}</div>` : ""}</div>`;
          html += !isPending ? `<input type="number" id="recQty-${item._idx}" class="qty-input" value="${item.qty}" inputmode="numeric" min="0" style="height:38px;">` : `<div id="dispQty-${item._idx}" class="order-qty-display">${item.qty}</div><input type="number" id="editQty-${item._idx}" class="qty-input edit-input-${safeId}" data-rownum="${item.rowNum}" value="${item.qty}" inputmode="numeric" min="0" style="display:none;height:38px;">`;
          html += `</div>`;
        });
        html += `</div></div>`;
      }
      if (hasReceivable) {
        html = `<div class="select-all-bar"><label><input type="checkbox" id="selectAll" checked onchange="toggleSelectAll(this)"> Select all for confirmation</label></div>` + html;
        html += `<button class="btn-primary btn-blue" id="btnBatchConfirm" onclick="submitReceipt()" style="margin-top:4px;">Confirm selected orders</button>`;
      }
      container.innerHTML = html;
    }

    function toggleDetails(safeId) { const det = document.getElementById("det-"+safeId); if(det) det.style.display = det.style.display === "block" ? "none" : "block"; }
    function toggleSelectAll(box) { document.querySelectorAll(".indv-chk").forEach(c => c.checked = box.checked); }

    function toggleEdit(safeId) {
      const btn = document.getElementById("editBtn-"+safeId);
      const inputs = document.querySelectorAll(".edit-input-"+safeId);
      const det = document.getElementById("det-"+safeId);
      if (btn.textContent === "Edit") {
        det.style.display = "block"; btn.textContent = "Save"; btn.className = "btn-sm btn-sm-blue";
        inputs.forEach(inp => { document.getElementById("dispQty-"+inp.id.split("-")[1]).style.display = "none"; inp.style.display = "block"; });
      } else {
        btn.textContent = "Saving…"; btn.disabled = true;
        const updates = Array.from(inputs).map(inp => ({ rowNum: inp.dataset.rownum, qty: parseInt(inp.value)||0 }));
        callGAS("updatePendingOrder", { payload: { updates }, userInfo: { name: currentUser.name, pin } })
          .then(msg => { alert(msg); fetchDeliveries(); })
          .catch(err => { alert("Error: "+err.message); btn.textContent = "Save"; btn.disabled = false; });
      }
    }

    async function submitReceipt(specificSafeId) {
      const receiptData = [];
      pendingDeliveries.forEach(item => {
        if (item.status !== "ON THE WAY") return;
        const isTarget = specificSafeId ? item.id.replace(/[^a-zA-Z0-9]/g,"") === specificSafeId : document.getElementById("chk-"+item.id.replace(/[^a-zA-Z0-9]/g,""))?.checked;
        if (isTarget) { const qty = parseInt(document.getElementById("recQty-"+item._idx)?.value); if (!isNaN(qty)) receiptData.push({ rowNum: item.rowNum, item: item.item, receivedQty: qty }); }
      });
      if (!receiptData.length) { alert("No dispatched orders to confirm yet."); return; }
      const btnId = specificSafeId ? "confirmBtn-"+specificSafeId : "btnBatchConfirm";
      const btn = document.getElementById(btnId);
      if (btn) { btn.textContent = "Wait…"; btn.disabled = true; }
      try {
        const msg = await callGAS("submitReceiving", { payload: receiptData, userInfo: { name: currentUser.name, pin } });
        alert(msg); fetchDeliveries();
      } catch (err) {
        alert("Error: "+err.message);
        if (btn) { btn.textContent = specificSafeId ? "Confirm" : "Confirm selected orders"; btn.disabled = false; }
      }
    }

    function renderHistory(data) {
      const container = document.getElementById("historyContent");
      if (!data.length) { container.innerHTML = '<div class="loading">No delivery history found.</div>'; return; }
      const grouped = {};
      data.forEach(item => { if (!grouped[item.id]) grouped[item.id] = { time: item.receivedAt, driver: item.driver, items: [] }; grouped[item.id].items.push(item); });
      container.innerHTML = Object.entries(grouped).map(([oId, order]) => `
        <div class="history-card">
          <div class="hist-top"><div><div class="hist-id">${oId}</div><div class="hist-time">${order.time}</div></div><div class="hist-status">Received ✓</div></div>
          ${order.items.map(sub => `<div class="hist-item"><span>${sub.item}</span><strong>Qty: ${sub.qty}</strong></div>`).join("")}
          <div class="hist-driver">Handled by: ${order.driver}</div>
        </div>`).join("");
    }

    init();
  </script>
</body>
</html>
