<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LOVA — Staff Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#1a1f2e; --navy2:#2d3447;
      --red:#c0392b; --red-soft:#fdf0ef; --red-border:#f5c6c2;
      --canvas:#f7f5f0; --surface:#ffffff;
      --border:#e4e1db; --border-soft:#ede9e3;
      --text:#1a1f2e; --text-2:#5a5750; --text-3:#9a9690;
      /* Status pipeline */
      --s-grey:#64748b;   --s-grey-bg:#f1f5f9;   --s-grey-border:#cbd5e1;
      --s-blue:#1a5fa8;   --s-blue-bg:#eef3fb;   --s-blue-border:#bcd3f0;
      --s-amber:#92570a;  --s-amber-bg:#fef3c7;  --s-amber-border:#fcd34d;
      --s-teal:#0f766e;   --s-teal-bg:#ccfbf1;   --s-teal-border:#5eead4;
      --s-green:#166534;  --s-green-bg:#dcfce7;  --s-green-border:#86efac;
    }
    * { box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent; }
    body { font-family:'Plus Jakarta Sans','Sarabun',sans-serif;background:var(--canvas);min-height:100vh;padding-bottom:48px; }
    .top-nav { background:var(--navy);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100; }
    .nav-left { display:flex;align-items:baseline;gap:10px; }
    .nav-wordmark { font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:1px; }
    .nav-tag { font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase; }
    .nav-right { display:flex;align-items:center;gap:8px; }
    .nav-user { font-size:12px;font-weight:500;color:rgba(255,255,255,0.55); }
    .lang-toggle-nav { display:flex;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:2px;gap:1px; }
    .lang-btn { padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);transition:all 0.15s; }
    .lang-btn.active { background:rgba(255,255,255,0.2);color:#fff; }
    .btn-logout { background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.12);padding:6px 12px;border-radius:6px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:background 0.15s; }
    .content { padding:16px;max-width:600px;margin:0 auto; }
    .card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(26,31,46,0.04); }
    .section-label { font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-soft); }
    .branch-label { font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px; }
    .branch-select { width:100%;border:none;background:transparent;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:15px;font-weight:600;color:var(--text);outline:none;cursor:pointer;-webkit-appearance:none; }
    .branch-row { display:flex;align-items:center;justify-content:space-between; }
    .btn-history { background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:11px;font-weight:500;cursor:pointer;width:100%;margin-top:12px;transition:background 0.15s; }
    .tabs { display:flex;background:var(--canvas);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:14px;gap:3px; }
    .tab { flex:1;text-align:center;padding:10px 8px;font-size:12px;font-weight:500;color:var(--text-3);cursor:pointer;border-radius:7px;transition:background 0.15s,color 0.15s; }
    .tab.active { background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(26,31,46,0.07); }
    .search-input { width:100%;height:44px;border:1px solid var(--border);border-radius:9px;padding:0 14px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:14px;color:var(--text);background:var(--surface);outline:none;margin-bottom:10px;-webkit-appearance:none;transition:border-color 0.2s; }
    .search-input:focus { border-color:var(--navy2); }
    .chips { display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none; }
    .chips::-webkit-scrollbar { display:none; }
    .chip { padding:6px 13px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text-3);font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all 0.15s; }
    .chip.active { background:var(--navy);color:#fff;border-color:var(--navy); }
    .product-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s; }
    .product-card.has-qty { border-color:var(--navy); }
    .prod-img { width:44px;height:44px;border-radius:7px;object-fit:cover;background:var(--canvas);flex-shrink:0; }
    .prod-info { flex:1;padding:0 12px; }
    .prod-name { font-size:13px;font-weight:600;color:var(--text);line-height:1.3; }
    .prod-desc { font-size:11px;color:var(--text-3);margin-top:3px; }
    .qty-input { width:60px;height:44px;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--canvas);color:var(--text);outline:none;-webkit-appearance:none;padding:0;transition:border-color 0.15s,background 0.15s; }
    .qty-input:focus { border-color:var(--navy);background:var(--surface); }
    .btn-primary { width:100%;height:50px;border:none;border-radius:10px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity 0.15s,transform 0.15s;background:var(--navy);color:#fff; }
    .btn-primary:active { transform:scale(0.98); }
    .btn-primary:disabled { opacity:0.4;cursor:not-allowed;transform:none; }
    .btn-primary:hover:not(:disabled) { background:var(--navy2); }
    .btn-blue-action { background:var(--s-blue); }
    .btn-blue-action:hover:not(:disabled) { background:#134d8c; }
    .btn-green-action { background:#16a34a; }
    .btn-green-action:hover:not(:disabled) { background:#15803d; }

    /* ── STATUS BADGES ── */
    .badge { display:inline-block;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;margin-top:5px;border:1px solid; }
    .badge-grey    { background:var(--s-grey-bg);   color:var(--s-grey);   border-color:var(--s-grey-border); }
    .badge-blue    { background:var(--s-blue-bg);   color:var(--s-blue);   border-color:var(--s-blue-border); }
    .badge-amber   { background:var(--s-amber-bg);  color:var(--s-amber);  border-color:var(--s-amber-border); }
    .badge-teal    { background:var(--s-teal-bg);   color:var(--s-teal);   border-color:var(--s-teal-border); }
    .badge-green   { background:var(--s-green-bg);  color:var(--s-green);  border-color:var(--s-green-border); }

    .order-batch { background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden; }
    .batch-head { padding:13px 15px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px; }
    .batch-head-left { display:flex;align-items:flex-start;gap:10px;flex:1;cursor:pointer; }
    .batch-id-text { font-size:12px;font-weight:600;color:var(--text); }
    .batch-meta { font-size:11px;color:var(--text-3);margin-top:3px; }
    .btn-sm { padding:7px 13px;border-radius:7px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;transition:background 0.15s;white-space:nowrap;flex-shrink:0; }
    .btn-sm-blue  { background:var(--s-blue-bg);  color:var(--s-blue);  border-color:var(--s-blue-border); }
    .btn-sm-amber { background:var(--s-amber-bg); color:var(--s-amber); border-color:var(--s-amber-border); }
    .btn-sm-muted { background:var(--canvas);color:var(--text-3);border-color:var(--border);cursor:not-allowed; }
    .order-details { display:none;border-top:1px dashed var(--border);padding:10px 14px; }
    .order-item-row { display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft); }
    .order-item-row:last-child { border-bottom:none; }
    .order-item-name { font-size:13px;font-weight:600;color:var(--text); }
    .order-item-sub { font-size:11px;color:var(--text-3);margin-top:2px; }
    .order-qty-display { font-size:18px;font-weight:500;color:var(--text); }
    .select-all-bar { background:var(--canvas);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:12px; }
    .select-all-bar label { font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:10px; }
    input[type="checkbox"] { width:17px;height:17px;accent-color:var(--s-blue);cursor:pointer; }
    .history-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px; }
    .hist-top { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--border); }
    .hist-id { font-size:12px;font-weight:600;color:var(--text); }
    .hist-time { font-size:11px;color:var(--text-3);margin-top:2px; }
    .hist-status { font-size:11px;font-weight:600;color:var(--s-green); }
    .hist-item { display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);font-weight:500;padding:6px 0;border-bottom:1px solid var(--border-soft); }
    .hist-item:last-child { border-bottom:none; }
    .hist-item strong { color:var(--text);font-weight:600; }
    .hist-driver { font-size:11px;color:var(--text-2);margin-top:10px;background:var(--canvas);padding:5px 9px;border-radius:5px;display:inline-block;border:1px solid var(--border); }
    .modal-overlay { position:fixed;inset:0;background:rgba(26,31,46,0.55);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s; }
    .modal-overlay.open { opacity:1;pointer-events:auto; }
    .modal-sheet { background:var(--surface);width:100%;max-width:600px;border-radius:18px 18px 0 0;padding:22px 20px 40px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);max-height:85vh;display:flex;flex-direction:column; }
    .modal-overlay.open .modal-sheet { transform:translateY(0); }
    .modal-handle { width:32px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 18px; }
    .modal-title { font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text); }
    .modal-sub { font-size:11px;font-weight:500;color:var(--text-3);margin-top:4px;margin-bottom:18px; }
    .modal-list { overflow-y:auto;flex:1;border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft); }
    .modal-item { display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px dashed var(--border); }
    .modal-item:last-child { border-bottom:none; }
    .modal-item-name { font-size:13px;font-weight:500;color:var(--text); }
    .modal-item-qty { font-size:14px;font-weight:600;color:var(--s-green);background:var(--s-green-bg);padding:4px 12px;border-radius:6px;border:1px solid var(--s-green-border); }
    .modal-total { font-size:13px;font-weight:600;color:var(--text);text-align:right;margin:12px 0 18px; }
    .modal-btns { display:flex;gap:10px; }
    .btn-cancel { flex:1;height:48px;background:var(--canvas);color:var(--text-2);border:1px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s; }
    .btn-confirm { flex:2;height:48px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-family:'Plus Jakarta Sans','Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.15s; }
    .btn-confirm:active { transform:scale(0.98); }
    .btn-confirm:disabled { opacity:0.45;cursor:not-allowed;transform:none; }
    .loading { text-align:center;color:var(--text-3);padding:40px 20px;font-size:13px; }
    .empty-state { text-align:center;color:var(--s-green);padding:40px 20px;font-size:13px;font-weight:500; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <div class="nav-wordmark">LOVA</div>
      <div class="nav-tag" id="nav_tag">Staff</div>
    </div>
    <div class="nav-right">
      <div class="nav-user" id="navUser"></div>
      <div class="lang-toggle-nav">
        <button class="lang-btn active" id="btnEN" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btnTH" onclick="setLang('th')">TH</button>
      </div>
      <button class="btn-logout" id="btn_logout" onclick="logout()">Logout</button>
    </div>
  </nav>
  <div class="content">
    <div class="card">
      <span class="branch-label" id="txt_ordering_for">Ordering for branch</span>
      <div class="branch-row">
        <select id="branchSelector" class="branch-select" onchange="handleBranchChange()">
          <option value="" disabled selected>Select a branch…</option>
        </select>
      </div>
      <button class="btn-history" id="btnToggleHistory" onclick="toggleHistory()">View 7-day history</button>
    </div>
    <div id="mainArea">
      <div class="tabs">
        <div class="tab active" id="tabOrder" onclick="switchTab('order')">Place order</div>
        <div class="tab" id="tabReceive" onclick="switchTab('receive')">Active orders</div>
      </div>
      <div id="viewOrder"><div class="loading">Loading menu…</div></div>
      <div id="viewReceive" style="display:none;"><div class="loading">Loading…</div></div>
    </div>
    <div id="viewHistory" style="display:none;">
      <div class="section-label" id="txt_completed">Completed deliveries — last 7 days</div>
      <div id="historyContent"><div class="loading">Loading…</div></div>
    </div>
  </div>
  <div class="modal-overlay" id="reviewModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="txt_review_order">Review order</div>
      <div class="modal-sub" id="modalBranch"></div>
      <div class="modal-list" id="modalList"></div>
      <div class="modal-total" id="modalTotal"></div>
      
      <div style="margin-bottom: 18px; padding: 12px; background: var(--red-soft); border: 1px dashed var(--red-border); border-radius: 8px; display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" id="urgentCheck" style="width: 18px; height: 18px; accent-color: var(--red); cursor: pointer;">
        <label for="urgentCheck" style="font-size: 13px; font-weight: 600; color: var(--red); cursor: pointer;">Mark order as URGENT 🔴</label>
      </div>

      <div class="modal-btns">
        <button class="btn-cancel" id="btn_go_back" onclick="closeModal()">Go back</button>
        <button class="btn-confirm" id="btnConfirm" onclick="confirmOrder()">Confirm & send</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzeZ8CLU50nn2MDA6EoU0ZKnu8qihZRU-LhAgsk9GVqa7TKA44J5fVx-lMu-oeFiGWqfA/exec";
    const T = {
      en: { nav_tag:"Staff", logout:"Logout", ordering_for:"Ordering for branch", view_history:"View 7-day history", back_ordering:"← Back to ordering", place_order:"Place order", active_orders:"Active orders", completed:"Completed deliveries — last 7 days", review_order:"Review order", target:"Target", total_units:"Total units", go_back:"Go back", confirm_send:"Confirm & send", sending:"Sending…", select_all:"Select all for confirmation", confirm_selected:"Confirm selected orders",
        awaiting_cutoff:"Awaiting cut-off", prepping:"Prepping", on_the_way:"On the way", verified:"Chef confirmed", awaiting_driver:"Awaiting driver", confirm:"Confirm", edit:"Edit", save:"Save", saving:"Saving…", received:"Received ✓", handled_by:"Handled by", no_active:"All clear — no active orders.", no_history:"No delivery history found.", expected:"Expected", by:"By", qty:"Qty", search:"Search products…" },
      th: { nav_tag:"พนักงาน", logout:"ออกจากระบบ", ordering_for:"สั่งของให้สาขา", view_history:"ดูประวัติ 7 วัน", back_ordering:"← กลับสู่การสั่งของ", place_order:"สั่งของ", active_orders:"ออเดอร์ที่รอดำเนินการ", completed:"ประวัติการจัดส่ง — 7 วันที่ผ่านมา", review_order:"ตรวจสอบออเดอร์", target:"สาขาปลายทาง", total_units:"จำนวนทั้งหมด", go_back:"ย้อนกลับ", confirm_send:"ยืนยันและส่ง", sending:"กำลังส่ง…", select_all:"เลือกทั้งหมดเพื่อยืนยัน", confirm_selected:"ยืนยันออเดอร์ที่เลือก",
        awaiting_cutoff:"รอรอบส่งของถัดไป", prepping:"กำลังเตรียม", on_the_way:"กำลังจัดส่ง", verified:"เชฟยืนยันแล้ว", awaiting_driver:"รอคนขับ", confirm:"ยืนยัน", edit:"แก้ไข", save:"บันทึก", saving:"กำลังบันทึก…", received:"ได้รับแล้ว ✓", handled_by:"ดูแลโดย", no_active:"ไม่มีออเดอร์ที่รอดำเนินการ", no_history:"ไม่พบประวัติการจัดส่ง", expected:"จำนวนที่สั่ง", by:"โดย", qty:"จำนวน", search:"ค้นหาสินค้า…" }
    };
    let currentLang=sessionStorage.getItem("lova_lang")||"en";
    const pin=sessionStorage.getItem("lova_pin")||"";
    if(!pin)window.location.href="index.html";
    let masterProducts=[],masterBranches=[],currentUser=null,selectedBranch="",pendingDeliveries=[],pendingOrderData=[],isShowingHistory=false,filterCat="ALL";
    function t(k){return T[currentLang][k]||T.en[k]||k;}
    function setLang(lang){
      currentLang=lang;sessionStorage.setItem("lova_lang",lang);
      document.getElementById("btnEN").classList.toggle("active",lang==="en");
      document.getElementById("btnTH").classList.toggle("active",lang==="th");
      document.getElementById("nav_tag").textContent=t("nav_tag");
      document.getElementById("btn_logout").textContent=t("logout");
      document.getElementById("txt_ordering_for").textContent=t("ordering_for");
      document.getElementById("btnToggleHistory").textContent=isShowingHistory?t("back_ordering"):t("view_history");
      document.getElementById("tabOrder").textContent=t("place_order");
      document.getElementById("tabReceive").textContent=t("active_orders");
      document.getElementById("txt_completed").textContent=t("completed");
      document.getElementById("txt_review_order").textContent=t("review_order");
      document.getElementById("btn_go_back").textContent=t("go_back");
      document.getElementById("btnConfirm").textContent=t("confirm_send");
    }
    setLang(currentLang);
    async function callGAS(action,params={}){
      const res=await fetch(GAS_URL+"?callback=_",{method:"POST",body:JSON.stringify({action,...params}),headers:{"Content-Type":"text/plain"}});
      const data=await res.json();if(data.error)throw new Error(data.error);return data.result;
    }
    async function init(){
      try{
        currentUser=await callGAS("verifyStaff",{pin});
        document.getElementById("navUser").textContent=currentUser.name;
        const initData=await callGAS("getStaffAppInitData");
        masterProducts=initData.products;masterBranches=initData.branches;
        const sel=document.getElementById("branchSelector");
        masterBranches.forEach(b=>sel.innerHTML+=`<option value="${b}">${b}</option>`);
        renderOrderMenu();
        if(currentUser.branch){sel.value=currentUser.branch;selectedBranch=currentUser.branch;fetchDeliveries();}
      }catch(err){alert("Session error: "+err.message);window.location.href="index.html";}
    }
    function logout(){sessionStorage.clear();window.location.href="logout.html?src=staff";}
    function handleBranchChange(){
      const nb=document.getElementById("branchSelector").value;
      if(currentUser.role!=="Admin"&&currentUser.branch&&nb!==currentUser.branch){
        if(!confirm((currentLang==="th"?"คำเตือน: สาขาของคุณคือ ":"Branch override — you are assigned to: ")+currentUser.branch+(currentLang==="th"?" สั่งให้: ":" — ordering for: ")+nb+(currentLang==="th"?"\nดำเนินการต่อ?":"\n\nContinue?"))){document.getElementById("branchSelector").value=selectedBranch;return;}
      }
      selectedBranch=nb;fetchDeliveries();
    }
    async function fetchDeliveries(){
      if(!selectedBranch)return;
      document.getElementById("viewReceive").innerHTML=`<div class="loading">${t("loading")||"Loading…"}</div>`;
      document.getElementById("historyContent").innerHTML=`<div class="loading">${t("loading")||"Loading…"}</div>`;
      try{
        const[pending,history]=await Promise.all([callGAS("getPendingReceivingForBranch",{branch:selectedBranch}),callGAS("getOrderHistory",{branch:selectedBranch})]);
        pendingDeliveries=pending;renderReceiveView(pending);renderHistory(history);
      }catch(err){document.getElementById("viewReceive").innerHTML=`<div class="loading">Error.</div>`;}
    }
    function switchTab(tab){
      document.getElementById("tabOrder").classList.toggle("active",tab==="order");
      document.getElementById("tabReceive").classList.toggle("active",tab==="receive");
      document.getElementById("viewOrder").style.display=tab==="order"?"block":"none";
      document.getElementById("viewReceive").style.display=tab==="receive"?"block":"none";
    }
    function toggleHistory(){
      isShowingHistory=!isShowingHistory;
      document.getElementById("mainArea").style.display=isShowingHistory?"none":"block";
      document.getElementById("viewHistory").style.display=isShowingHistory?"block":"none";
      document.getElementById("btnToggleHistory").textContent=isShowingHistory?t("back_ordering"):t("view_history");
    }
    function renderOrderMenu(){
      let cats=["ALL"];
      masterProducts.forEach(p=>{const c=(p[3]||"Uncategorized").trim();if(!cats.includes(c))cats.push(c);});
      let html=`<input type="text" id="searchInput" class="search-input" placeholder="${t('search')}" oninput="filterProducts()">`;
      html+=`<div class="chips">`;
      cats.forEach(c=>{const safe=c.replace(/[^a-zA-Z0-9]/g,"");html+=`<div class="chip ${c==="ALL"?"active":""}" id="chip-${safe}" onclick="setCategory('${c}')">${c}</div>`;});
      html+=`</div><div id="productList">`;
      masterProducts.forEach((p,i)=>{
        const cat=(p[3]||"Uncategorized").trim();
        const imgHtml=p[4]?`<img src="${p[4]}" class="prod-img">`:`<div class="prod-img"></div>`;
        const descHtml=p[2]?`<div class="prod-desc">${p[2]}</div>`:"";
        html+=`<div class="product-card item-card" data-name="${(p[1]||"").toLowerCase()}" data-cat="${cat}">${imgHtml}<div class="prod-info"><div class="prod-name">${p[1]}</div>${descHtml}</div><input type="number" id="qty-${i}" class="qty-input" placeholder="0" inputmode="numeric" min="0" oninput="this.closest('.product-card').classList.toggle('has-qty',parseInt(this.value)>0)"></div>`;
      });
      html+=`</div><button class="btn-primary" onclick="reviewOrder()">${t('review_order')}</button>`;
      document.getElementById("viewOrder").innerHTML=html;
    }
    function setCategory(cat){
      filterCat=cat;
      document.querySelectorAll(".chip").forEach(el=>el.classList.remove("active"));
      document.getElementById("chip-"+cat.replace(/[^a-zA-Z0-9]/g,""))?.classList.add("active");
      filterProducts();
    }
    function filterProducts(){
      const q=(document.getElementById("searchInput")?.value||"").toLowerCase();
      document.querySelectorAll(".item-card").forEach(card=>{card.style.display=(card.dataset.name.includes(q)&&(filterCat==="ALL"||card.dataset.cat===filterCat))?"flex":"none";});
    }
    function reviewOrder(){
      pendingOrderData=[];let total=0,html="";
      masterProducts.forEach((p,i)=>{const qty=parseInt(document.getElementById("qty-"+i)?.value);if(qty>0){pendingOrderData.push({name:p[1],qty});total+=qty;html+=`<div class="modal-item"><span class="modal-item-name">${p[1]}</span><span class="modal-item-qty">×${qty}</span></div>`;}});
      if(!pendingOrderData.length){alert(currentLang==="th"?"กรุณากรอกจำนวนอย่างน้อยหนึ่งรายการ":"Please enter at least one quantity.");return;}
      document.getElementById("modalBranch").textContent=t("target")+": "+selectedBranch;
      document.getElementById("modalList").innerHTML=html;
      document.getElementById("modalTotal").textContent=t("total_units")+": "+total;
      document.getElementById("reviewModal").classList.add("open");
    }
    function closeModal(){document.getElementById("reviewModal").classList.remove("open");}
    
    // URGENT FLAG ADDED HERE //
    async function confirmOrder(){
      const btn=document.getElementById("btnConfirm");btn.textContent=t("sending");btn.disabled=true;
      const isUrgent = document.getElementById("urgentCheck")?.checked || false;
      try{
        const msg=await callGAS("processOrder",{orderData:pendingOrderData,userInfo:{name:currentUser.name,pin},targetBranch:selectedBranch, isUrgent: isUrgent});
        closeModal();alert(msg);
        if(document.getElementById("urgentCheck")) document.getElementById("urgentCheck").checked = false;
        masterProducts.forEach((_,i)=>{const el=document.getElementById("qty-"+i);if(el)el.value="";});
        document.querySelectorAll(".product-card").forEach(c=>c.classList.remove("has-qty"));
        await fetchDeliveries();switchTab("receive");
      }catch(err){alert("Error: "+err.message);}
      btn.textContent=t("confirm_send");btn.disabled=false;
    }

    /* Status badge helper */
    function statusBadge(status,lang){
      const map={
        "":"grey", "PENDING":"grey",
        "SENT":"blue",
        "ON THE WAY":"amber",
        "STAFF VERIFIED":"teal","CHEF CONFIRMED":"teal",
        "DELIVERED":"green","RECEIVED":"green",
        "CANCELLED":"red"
      };
      const cls=map[status]||"grey";
      const labels={
        en:{"":"Awaiting cut-off","PENDING":"Awaiting cut-off","SENT":"Prepping","ON THE WAY":"On the way","STAFF VERIFIED":"Chef confirmed","CHEF CONFIRMED":"Chef confirmed","DELIVERED":"Delivered","RECEIVED":"Received","CANCELLED":"Cancelled"},
        th:{"":"รอรอบส่งของถัดไป","PENDING":"รอรอบส่งของถัดไป","SENT":"กำลังเตรียม","ON THE WAY":"กำลังจัดส่ง","STAFF VERIFIED":"เชฟยืนยันแล้ว","CHEF CONFIRMED":"เชฟยืนยันแล้ว","DELIVERED":"จัดส่งแล้ว","RECEIVED":"ได้รับแล้ว","CANCELLED":"ยกเลิก"}
      };
      const label=(labels[lang]||labels.en)[status]||(labels.en[status]||status);
      return`<div class="badge badge-${cls}">${label}</div>`;
    }

    function renderReceiveView(data){
      const container=document.getElementById("viewReceive");
      if(!data.length){container.innerHTML=`<div class="empty-state">${t("no_active")}</div>`;return;}
      const grouped={};
      data.forEach((item,idx)=>{item._idx=idx;if(!grouped[item.id])grouped[item.id]={id:item.id,date:item.date,orderedBy:item.orderedBy,items:[]};grouped[item.id].items.push(item);});
      let hasReceivable=false,html="";
      for(const key in grouped){
        const grp=grouped[key],safeId=key.replace(/[^a-zA-Z0-9]/g,"");
        const status=grp.items[0].status,isPending=status===""||status==="PENDING",isPrepping=status==="SENT";
        if(!isPending&&!isPrepping)hasReceivable=true;
        const badge=statusBadge(status,currentLang);
        const actionBtn=isPending?`<button class="btn-sm btn-sm-amber" id="editBtn-${safeId}" onclick="toggleEdit('${safeId}')">${t("edit")}</button>`:isPrepping?`<button class="btn-sm btn-sm-muted" disabled>${t("awaiting_driver")}</button>`:`<button class="btn-sm btn-sm-blue" id="confirmBtn-${safeId}" onclick="submitReceipt('${safeId}')">${t("confirm")}</button>`;
        const chkHtml=(!isPending&&!isPrepping)?`<input type="checkbox" id="chk-${safeId}" class="indv-chk" checked>`:"";
        html+=`<div class="order-batch"><div class="batch-head">${chkHtml}<div class="batch-head-left" onclick="toggleDetails('${safeId}')"><div><div class="batch-id-text">${grp.id}</div><div class="batch-meta">${t("by")} ${grp.orderedBy} · ${grp.date}</div>${badge}</div></div>${actionBtn}</div><div class="order-details" id="det-${safeId}">`;
        grp.items.forEach(item=>{
          html+=`<div class="order-item-row"><div><div class="order-item-name">${item.item}</div>${!isPending?`<div class="order-item-sub">${t("expected")}: ${item.qty}</div>`:""}</div>`;
          html+=!isPending?`<input type="number" id="recQty-${item._idx}" class="qty-input" value="${item.qty}" inputmode="numeric" min="0" style="height:38px;">`:
            `<div id="dispQty-${item._idx}" class="order-qty-display">${item.qty}</div><input type="number" id="editQty-${item._idx}" class="qty-input edit-input-${safeId}" data-rownum="${item.rowNum}" value="${item.qty}" inputmode="numeric" min="0" style="display:none;height:38px;">`;
          html+=`</div>`;
        });
        html+=`</div></div>`;
      }
      if(hasReceivable){
        html=`<div class="select-all-bar"><label><input type="checkbox" id="selectAll" checked onchange="toggleSelectAll(this)"> ${t("select_all")}</label></div>`+html;
        html+=`<button class="btn-primary btn-blue-action" id="btnBatchConfirm" onclick="submitReceipt()" style="margin-top:4px;">${t("confirm_selected")}</button>`;
      }
      container.innerHTML=html;
    }
    function toggleDetails(safeId){const det=document.getElementById("det-"+safeId);if(det)det.style.display=det.style.display==="block"?"none":"block";}
    function toggleSelectAll(box){document.querySelectorAll(".indv-chk").forEach(c=>c.checked=box.checked);}
    function toggleEdit(safeId){
      const btn=document.getElementById("editBtn-"+safeId),inputs=document.querySelectorAll(".edit-input-"+safeId),det=document.getElementById("det-"+safeId);
      if(btn.textContent===t("edit")||btn.textContent==="Edit"||btn.textContent==="แก้ไข"){
        det.style.display="block";btn.textContent=t("save");btn.className="btn-sm btn-sm-blue";
        inputs.forEach(inp=>{document.getElementById("dispQty-"+inp.id.split("-")[1]).style.display="none";inp.style.display="block";});
      }else{
        btn.textContent=t("saving");btn.disabled=true;
        const updates=Array.from(inputs).map(inp=>({rowNum:inp.dataset.rownum,qty:parseInt(inp.value)||0}));
        callGAS("updatePendingOrder",{payload:{updates},userInfo:{name:currentUser.name,pin}})
          .then(msg=>{alert(msg);fetchDeliveries();})
          .catch(err=>{alert("Error: "+err.message);btn.textContent=t("save");btn.disabled=false;});
      }
    }
    async function submitReceipt(specificSafeId){
      const receiptData=[];
      pendingDeliveries.forEach(item=>{
        if(item.status!=="ON THE WAY")return;
        const isTarget=specificSafeId?item.id.replace(/[^a-zA-Z0-9]/g,"")===specificSafeId:document.getElementById("chk-"+item.id.replace(/[^a-zA-Z0-9]/g,""))?.checked;
        if(isTarget){const qty=parseInt(document.getElementById("recQty-"+item._idx)?.value);if(!isNaN(qty))receiptData.push({rowNum:item.rowNum,item:item.item,receivedQty:qty});}
      });
      if(!receiptData.length){alert(currentLang==="th"?"ยังไม่มีออเดอร์ที่ส่งมา":"No dispatched orders to confirm yet.");return;}
      const btnId=specificSafeId?"confirmBtn-"+specificSafeId:"btnBatchConfirm";
      const btn=document.getElementById(btnId);if(btn){btn.textContent="...";btn.disabled=true;}
      try{const msg=await callGAS("submitReceiving",{payload:receiptData,userInfo:{name:currentUser.name,pin}});alert(msg);fetchDeliveries();}
      catch(err){alert("Error: "+err.message);if(btn){btn.textContent=specificSafeId?t("confirm"):t("confirm_selected");btn.disabled=false;}}
    }
    function renderHistory(data){
      const container=document.getElementById("historyContent");
      if(!data.length){container.innerHTML=`<div class="loading">${t("no_history")}</div>`;return;}
      const grouped={};
      data.forEach(item=>{if(!grouped[item.id])grouped[item.id]={time:item.receivedAt,driver:item.driver,items:[]};grouped[item.id].items.push(item);});
      container.innerHTML=Object.entries(grouped).map(([oId,order])=>`
        <div class="history-card">
          <div class="hist-top"><div><div class="hist-id">${oId}</div><div class="hist-time">${order.time}</div></div><div class="hist-status">${t("received")}</div></div>
          ${order.items.map(sub=>`<div class="hist-item"><span>${sub.item}</span><strong>${t("qty")}: ${sub.qty}</strong></div>`).join("")}
          <div class="hist-driver">${t("handled_by")}: ${order.driver}</div>
        </div>`).join("");
    }
    init();
  </script>
</body>
</html>
