<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LOVA — Branch Ordering</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e; --navy2: #2d3447;
      --red: #c0392b; --red-soft: #fdf0ef; --red-border: #f5c6c2;
      --canvas: #f7f5f0; --surface: #ffffff;
      --border: #e4e1db; --border-soft: #ede9e3;
      --text: #1a1f2e; --text-2: #5a5750; --text-3: #9a9690;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--canvas); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 380px; overflow: hidden; box-shadow: 0 4px 24px rgba(26,31,46,0.08); }
    .card-top { padding: 36px 32px 28px; text-align: center; border-bottom: 1px solid var(--border-soft); }
    .wordmark { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--text); letter-spacing: 2px; }
    .wordmark-accent { display: block; width: 28px; height: 2px; background: var(--red); border-radius: 1px; margin: 8px auto 10px; }
    .wordmark-sub { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 2.5px; text-transform: uppercase; }
    .card-body { padding: 28px 32px 32px; }
    .field-label { font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 8px; }
    .pin-input { width: 100%; height: 56px; background: var(--canvas); border: 1.5px solid var(--border); border-radius: 10px; text-align: center; font-family: 'DM Sans', monospace; font-size: 26px; font-weight: 500; letter-spacing: 10px; color: var(--text); outline: none; -webkit-appearance: none; transition: border-color 0.2s, background 0.2s; margin-bottom: 6px; }
    .pin-input:focus { border-color: var(--navy); background: #fff; }
    .pin-input.shake { border-color: var(--red); animation: shake 0.35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 60%{transform:translateX(5px)} }
    .error-msg { font-size: 12px; font-weight: 500; color: var(--red); min-height: 20px; margin-bottom: 14px; text-align: center; }
    .btn { width: 100%; height: 50px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--navy2); }
    #adminHub { display: none; }
    .welcome-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .welcome-hint { font-size: 12px; font-weight: 400; color: var(--text-3); margin-bottom: 24px; }
    .hub-btn { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 14px; text-align: left; transition: border-color 0.15s, background 0.15s, transform 0.1s; }
    .hub-btn:hover { background: var(--canvas); border-color: var(--navy2); }
    .hub-btn:active { transform: scale(0.99); }
    .hub-btn.is-admin { border-color: var(--red-border); background: var(--red-soft); }
    .hub-btn.is-admin:hover { background: #fae6e4; }
    .hub-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--canvas); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .hub-icon.staff { background: #eaf4f0; }
    .hub-icon.driver { background: #eef3fb; }
    .hub-icon.admin { background: var(--red-soft); }
    .hub-info { flex: 1; }
    .hub-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .hub-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .hub-arrow { font-size: 14px; color: var(--text-3); }
    .card-footer { text-align: center; padding: 0 32px 20px; font-size: 10px; font-weight: 500; color: var(--text-3); letter-spacing: 1.5px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="wordmark">LOVA</div>
      <span class="wordmark-accent"></span>
      <div class="wordmark-sub">Branch Ordering System</div>
    </div>
    <div class="card-body">
      <div id="loginView">
        <label class="field-label" for="universalPin">Access PIN</label>
        <input type="password" id="universalPin" class="pin-input" placeholder="····" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="off">
        <div class="error-msg" id="errorMsg"></div>
        <button class="btn btn-primary" id="btnEnter" onclick="verifyLogin()">Authenticate</button>
      </div>
      <div id="adminHub">
        <div class="welcome-name" id="welcomeName">Welcome</div>
        <div class="welcome-hint">Select your portal to continue</div>
        <button class="hub-btn" onclick="goTo('staff', this)">
          <div class="hub-icon staff">🍳</div>
          <div class="hub-info"><div class="hub-title">Kitchen Staff Portal</div><div class="hub-desc">Place and track branch orders</div></div>
          <div class="hub-arrow">→</div>
        </button>
        <button class="hub-btn" onclick="goTo('driver', this)">
          <div class="hub-icon driver">🚚</div>
          <div class="hub-info"><div class="hub-title">Driver Dispatch Portal</div><div class="hub-desc">Manage deliveries and manifests</div></div>
          <div class="hub-arrow">→</div>
        </button>
        <button class="hub-btn is-admin" onclick="goTo('admin', this)">
          <div class="hub-icon admin">⚙️</div>
          <div class="hub-info"><div class="hub-title">Admin Control Tower</div><div class="hub-desc">Review, edit and dispatch orders</div></div>
          <div class="hub-arrow">→</div>
        </button>
      </div>
    </div>
    <div class="card-footer">LOVA Hospitality Group</div>
  </div>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzeZ8CLU50nn2MDA6EoU0ZKnu8qihZRU-LhAgsk9GVqa7TKA44J5fVx-lMu-oeFiGWqfA/exec";
    let userPin = "";
    document.getElementById("universalPin").addEventListener("keyup", e => {
      if (e.key === "Enter") verifyLogin();
      document.getElementById("errorMsg").textContent = "";
      e.target.classList.remove("shake");
    });
    async function callGAS(action, params = {}) {
      const res = await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action, ...params }) });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.result;
    }
    async function verifyLogin() {
      userPin = document.getElementById("universalPin").value.trim();
      if (!userPin) return;
      const btn = document.getElementById("btnEnter");
      btn.textContent = "Verifying…"; btn.disabled = true;
      try {
        const user = await callGAS("universalVerify", { pin: userPin });
        if (user.role === "Admin") {
          document.getElementById("loginView").style.display = "none";
          document.getElementById("adminHub").style.display = "block";
          document.getElementById("welcomeName").textContent = "Welcome, " + user.name.split(" ")[0];
          btn.textContent = "Authenticate"; btn.disabled = false;
        } else {
          sessionStorage.setItem("lova_pin", userPin);
          window.location.href = user.role === "Driver" ? "driver.html" : "staff.html";
        }
      } catch (err) {
        document.getElementById("errorMsg").textContent = err.message;
        const inp = document.getElementById("universalPin");
        inp.classList.add("shake"); inp.value = "";
        btn.textContent = "Authenticate"; btn.disabled = false;
      }
    }
    function goTo(mode, btn) {
      if (btn) { btn.style.opacity = "0.55"; btn.disabled = true; }
      sessionStorage.setItem("lova_pin", userPin);
      window.location.href = mode === "admin" ? "admin.html" : mode === "driver" ? "driver.html" : "staff.html";
    }
  </script>
</body>
</html>
